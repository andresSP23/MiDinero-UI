name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  S3_BUCKET: mi-dinero-ui
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Archivos generados ==="
          ls dist/MiDinero-UI/browser/
          echo "=== Referencias en index.html ==="
          cat dist/MiDinero-UI/browser/index.html | grep -o 'src="[^"]*"\|href="[^"]*\.js"'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clear S3 bucket
        run: aws s3 rm s3://${{ env.S3_BUCKET }} --recursive

      - name: Deploy to S3
        run: aws s3 sync dist/MiDinero-UI/browser/ s3://${{ env.S3_BUCKET }}

       - name: Invalidate CloudFront cache
        env:
          DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          python3 -c "
          import boto3, time, os
          client = boto3.client('cloudfront')
          client.create_invalidation(
              DistributionId=os.environ['DIST_ID'],
              InvalidationBatch={
                  'Paths': {'Quantity': 1, 'Items': ['/*']},
                  'CallerReference': str(time.time())
              }
          )
          print('Invalidation created')
          "